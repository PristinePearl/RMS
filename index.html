/* =========================================================
   API HELPER  (POST as text/plain to dodge CORS preflight)
========================================================= */
let __busyCount = 0;
function __setBusy(on) {
  const bar = document.getElementById('globalLoadingBar');
  if (on) {
    __busyCount++;
    document.body.classList.add('is-busy');
    if (bar) bar.classList.add('active');
  } else {
    __busyCount = Math.max(0, __busyCount - 1);
    if (__busyCount === 0) {
      document.body.classList.remove('is-busy');
      if (bar) bar.classList.remove('active');
    }
  }
}

// Every action in the app (save, audit, approve, send-to-payment, report
// loads, etc.) funnels through this one function, so this is the single
// place that switches on the loading animation — a top progress bar plus
// a soft dim/disable on every .btn while the request is in flight.
async function api(action, payload) {
  if (!API_URL || API_URL.indexOf('PASTE_YOUR') === 0) {
    throw new Error('Backend URL not configured yet. Paste your Apps Script Web App URL into API_URL in the script.');
  }
  __setBusy(true);
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action, payload: payload || {} })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Request failed');
    return data;
  } finally {
    __setBusy(false);
  }
}

// Wraps a specific button's click handler so that button (not just the
// global bar) shows its own inline spinner and is disabled for the
// duration of the async action — used for the primary workflow actions
// (Approve / Query / Return / Send / Process Payment, etc).
async function withButtonLoading(btnEl, fn) {
  if (!btnEl) return fn();
  btnEl.classList.add('is-loading');
  btnEl.disabled = true;
  try {
    return await fn();
  } finally {
    btnEl.classList.remove('is-loading');
    btnEl.disabled = false;
  }
}

function toast(msg, type) {
  type = type || 'success';
  const colors = { success:'bg-emerald-500', error:'bg-red-500', info:'bg-indigo-500' };
  const el = document.createElement('div');
  el.className = 'toast ' + colors[type] + ' text-white text-sm font-semibold px-4 py-3 rounded-xl shadow-lg';
  el.textContent = msg;
  document.getElementById('toastHost').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = '.3s'; setTimeout(() => el.remove(), 300); }, 3200);
}

function fmtMoney(n) {
  n = Number(n) || 0;
  return '₹' + n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
}
function fmtDateTime(d) {
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  return dt.toLocaleString('en-IN', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}
function statusPill(status) {
  const cls = STATUS_COLORS[status] || 'bg-gray-100 text-gray-600';
  return `<span class="status-pill ${cls}">${status}</span>`;
}
function initials(name) {
  if (!name) return '?';
  return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
}

async function doLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.classList.add('hidden');
  if (!username || !password) { errEl.textContent = 'Please enter username and password.'; errEl.classList.remove('hidden'); return; }

  const btnText = document.getElementById('loginBtnText');
  btnText.innerHTML = '<svg class="w-4 h-4 spin" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="9" stroke-opacity=".25"/><path d="M21 12a9 9 0 00-9-9"/></svg> Signing in...';

  // Fixed demo credentials (also verified server-side against Users sheet when backend is configured)
  const DEMO = {

async function quickEmpLookup(codeInputId) {
  const code = document.getElementById(codeInputId).value.trim();
  if (!code) { toast('Enter an Emp ID first.', 'error'); return null; }
  const employees = await fetchAllEmployees();
  const cl = code.toLowerCase();
  let match = employees.find(e => String(pickField(e, ['Emp Id','Employee Code','EmpId'])).toLowerCase() === cl);
  if (!match) match = employees.find(e => Object.values(e).some(v => String(v).toLowerCase().includes(cl)));
  return match || null;
}

function fileDropZone(category, label, multiple) {
  return `
  <div>
    <label class="label">${label}</label>
    <label class="flex flex-col items-center justify-center border-2 border-dashed border-gray-200 rounded-xl py-5 cursor-pointer hover:border-brand-400 hover:bg-brand-50/40 transition">
      <svg class="w-6 h-6 text-brand-500 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
      <span class="text-xs text-gray-500 font-semibold">Click to upload</span>
      <input type="file" class="hidden" ${multiple ? 'multiple' : ''} onchange="handleFileSelect(event,'${category}')">
    </label>
    <div id="fileList_${category}" class="mt-2 space-y-1"></div>
  </div>`;
}

function handleFileSelect(evt, category) {
  const files = Array.from(evt.target.files);
  const readers = files.map(f => new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve({ name: f.name, mimeType: f.type || 'application/octet-stream', base64: reader.result.split(',')[1], category });
    reader.readAsDataURL(f);
  }));
  Promise.all(readers).then(results => {
    if (category === 'Attachment') STATE.pendingFiles.Attachment.push(...results);
    else STATE.pendingFiles[category] = results;
    renderFileList(category);
  });
}

function renderFileList(category) {
  const list = category === 'Attachment' ? STATE.pendingFiles.Attachment : STATE.pendingFiles[category];
  const el = document.getElementById('fileList_' + category);
  if (!el) return;
  el.innerHTML = list.map((f, i) => `
    <div class="flex items-center justify-between bg-gray-50 rounded-lg px-3 py-1.5 text-xs">
      <span class="truncate">${f.name}</span>
      <button onclick="removeFile('${category}', ${i})" class="text-red-400 hover:text-red-600 font-bold ml-2">✕</button>
    </div>`).join('');
}
function removeFile(category, idx) {
  if (category === 'Attachment') STATE.pendingFiles.Attachment.splice(idx, 1);
  else STATE.pendingFiles[category] = [];
  renderFileList(category);
}

// Your Manpower Code.gs only routes action=getAllEmployees (and getSummaryStats)
// through doGet/doPost — there is no "search" action wired up, so we fetch the
// full employee list once, cache it in memory, and filter client-side.
async function fetchAllEmployees() {
  if (STATE.employeeCache) return STATE.employeeCache;
  const url = MANPOWER_API_URL + '?action=getAllEmployees';
  let res;
  try {
    res = await fetch(url);
  } catch (e) {
    throw new Error('Network error reaching the Manpower system. Check your connection.');
  }
  const text = await res.text();
  let data;
  try {
    data = JSON.parse(text);
  } catch (e) {
    // The response wasn't JSON — almost always means the Manpower web app
    // returned an HTML page (a Google sign-in page or an Apps Script error
    // page) instead of data. Give an actionable message instead of the raw
    // "Unexpected token '<'" parse error.
    throw new Error('Manpower system returned a webpage instead of data. Check that the Manpower web app is deployed with "Who has access: Anyone" and that MANPOWER_API_URL points at the latest /exec deployment.');
  }
  if (!data.success) throw new Error(data.error || 'Manpower API returned an error.');
  STATE.employeeCache = data.employees || [];
  return STATE.employeeCache;
}

// Field names come straight from the Manpower sheet headers (e.g. "Emp Id",
// "Employee Name", "Department", "Short Designation", "Current City", "HQ").
// We try a few likely header variants since exact casing/wording can differ.
function pickField(emp, candidates) {
  for (const key of candidates) {
    if (emp[key] !== undefined && emp[key] !== '') return emp[key];
  }
  // fallback: case-insensitive partial match on header name
  const lowerCandidates = candidates.map(c => c.toLowerCase());
  for (const k of Object.keys(emp)) {
    if (lowerCandidates.some(c => k.toLowerCase().includes(c.toLowerCase()) || c.toLowerCase().includes(k.toLowerCase()))) {
      if (emp[k]) return emp[k];
    }
  }
  return '';
}

async function lookupEmployee(btnEl) {
  const q = document.getElementById('empSearch').value.trim();
  const resultEl = document.getElementById('empResult');
  if (!q) return;
  resultEl.innerHTML = '<p class="text-xs text-gray-400">Searching Manpower system...</p>';
  await withButtonLoading(btnEl, async () => {
  try {
    const employees = await fetchAllEmployees();
    const ql = q.toLowerCase();
    const matches = employees.filter(emp =>
      Object.values(emp).some(v => String(v).toLowerCase().includes(ql))
    ).slice(0, 8);

    if (!matches.length) {
      resultEl.innerHTML = '<p class="text-xs text-red-500">No matching employee found. You can enter details manually below.</p>';
      return;
    }
    if (matches.length === 1) {
      applyEmployee(matches[0]);
      return;
    }
    // multiple matches — let the user pick
    resultEl.innerHTML = `<p class="text-xs text-gray-500 font-semibold mb-2">${matches.length} matches — select one:</p>` +
      matches.map((emp, i) => {
        const name = pickField(emp, ['Employee Name','Name']);
        const code = pickField(emp, ['Emp Id','Employee Code','EmpId']);
        const dept = pickField(emp, ['Department']);
        return `<div class="flex items-center gap-3 bg-gray-50 hover:bg-brand-50 border border-gray-200 rounded-xl px-4 py-2.5 mb-2 cursor-pointer" onclick='selectEmployeeMatch(${i})'>
          <div class="w-8 h-8 rounded-full bg-brand-500 text-white flex items-center justify-center font-bold text-xs shrink-0">${initials(name)}</div>
          <div class="min-w-0"><p class="text-sm font-bold text-gray-800 truncate">${name}</p><p class="text-xs text-gray-500">${code} · ${dept}</p></div>
        </div>`;
      }).join('');
    STATE._empMatches = matches;
  } catch (e) {
    resultEl.innerHTML = `<p class="text-xs text-red-500">Could not reach Manpower system (${e.message}). Enter employee details manually.</p>`;
  }
  });
}

function selectEmployeeMatch(i) {
  applyEmployee(STATE._empMatches[i]);
}

function applyEmployee(emp) {
  const resultEl = document.getElementById('empResult');
  const name = pickField(emp, ['Employee Name','Name']);
  const code = pickField(emp, ['Emp Id','Employee Code','EmpId']);
  const designation = pickField(emp, ['Designation','Short Designation']);
  const department = pickField(emp, ['Department']);
  const team = pickField(emp, ['Team']);
  const location = pickField(emp, ['Current City','HQ','Current State']);
  const resigned = pickField(emp, ['Date Of Resignation']);

  document.getElementById('f_empCode').value = code;
  document.getElementById('f_empName').value = name;
  document.getElementById('f_designation').value = designation;
  document.getElementById('f_department').value = department;
  document.getElementById('f_team').value = team;
  document.getElementById('f_location').value = location;

  resultEl.innerHTML = `<div class="flex items-center gap-3 bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-3">
    <div class="w-9 h-9 rounded-full bg-emerald-500 text-white flex items-center justify-center font-bold text-xs shrink-0">${initials(name)}</div>
    <div class="min-w-0"><p class="text-sm font-bold text-gray-800 truncate">${name}</p><p class="text-xs text-gray-500">${code} · ${designation} · ${department}</p></div>
    ${resigned ? '<span class="status-pill bg-red-100 text-red-700 ml-auto shrink-0">Resigned</span>' : ''}

}

async function submitRequest(btnEl, sendToCommercial) {
  const partyType = document.querySelector('input[name="f_partyType"]:checked').value;
  const requestForType = document.getElementById('f_requestForType').value;

  const payload = {
    entryDate: document.getElementById('f_entryDate').value,
    mailReceivedDate: document.getElementById('f_mailDate').value,
    mailApproverEmpCode: document.getElementById('f_mailApproverCode').value,
    mailApproverName: document.getElementById('f_mailApproverName').value,
    mailApprovalDate: document.getElementById('f_mailApprovalDate').value,

    partyType: partyType,
    employeeCode: partyType === 'Staff' ? document.getElementById('f_empCode').value : '',
    employeeName: partyType === 'Staff' ? document.getElementById('f_empName').value : '',
    designation: partyType === 'Staff' ? document.getElementById('f_designation').value : '',
    department: partyType === 'Staff' ? document.getElementById('f_department').value : '',
    team: partyType === 'Staff' ? document.getElementById('f_team').value : '',
    location: partyType === 'Staff' ? document.getElementById('f_location').value : document.getElementById('f_directLocation').value,

    directType: partyType === 'Direct' ? document.querySelector('input[name="f_directType"]:checked').value : '',
    directName: partyType === 'Direct' ? document.getElementById('f_directName').value : '',
    directDetails: partyType === 'Direct' ? document.getElementById('f_directDetails').value : '',

    subject: document.getElementById('f_subject').value,
    claimType: document.getElementById('f_claimType').value,

    requestForType: requestForType,
    requestForEmpCode: requestForType === 'Staff' ? document.getElementById('f_reqForCode').value : '',
    requestForName: requestForType === 'Staff' ? document.getElementById('f_reqForName').value : '',
    requestForDesignation: requestForType === 'Staff' ? document.getElementById('f_reqForDesignation').value : '',
    requestForDepartment: requestForType === 'Staff' ? document.getElementById('f_reqForDepartment').value : '',
    requestForTeam: requestForType === 'Staff' ? document.getElementById('f_reqForTeam').value : '',
    requestForDetails: requestForType !== 'Staff' ? document.getElementById('f_reqForDetails').value : '',

    claimAmount: parseFloat(document.getElementById('f_claimAmount').value) || 0,
    remarks: document.getElementById('f_remarks').value,
    createdBy: STATE.user.username,
    entryPersonName: document.getElementById('f_entryPersonName').value || STATE.user.fullName
  };

  const claimantName = partyType === 'Staff' ? payload.employeeName : payload.directName;
  if (!claimantName || !payload.subject || !payload.claimAmount) {
    toast('Please fill the claimant name (Employee/Direct), Subject and Claim Amount.', 'error'); return;
  }
  if (requestForType === 'Staff' && !payload.requestForName) {
    toast('Please fetch or enter the Name for "Request For" (Emp ID lookup above).', 'error'); return;
  }
  await withButtonLoading(btnEl, async () => {
    try {
      const res = await api('createRequest', payload);
      const requestId = res.requestId;

      const allFiles = [...STATE.pendingFiles.Attachment, ...STATE.pendingFiles.SponsorSheet, ...STATE.pendingFiles.MailPDF];
      if (allFiles.length) {
        const uploadRes = await api('uploadAttachments', { requestId, uploadedBy: STATE.user.username, files: allFiles });
        if (uploadRes.failed && uploadRes.failed.length) {
          toast(uploadRes.failed.length + ' file(s) failed to upload: ' + uploadRes.failed.map(f => f.name).join(', '), 'error');
        }
      }
      if (sendToCommercial) {
        await api('sendToCommercial', { requestId, userBy: STATE.user.username });
        toast('Request ' + requestId + ' submitted to Commercial.');
      } else {
        toast('Request ' + requestId + ' saved as draft.');
      }
      navigate('myRequests');
    } catch (e) {
      toast(e.message, 'error');
    }
  });
}

    'Party Type': r.PartyType || 'Staff',

// Builds the "Request For" display value. For Staff requests it shows
// Name - Emp ID - Designation (falling back gracefully if any piece is
// missing); for Doctor/Cab/Other it keeps the type + free-text details.
function formatRequestFor(req) {
  if (!req.RequestForType) return req.RequestFor || '—';
  if (req.RequestForType === 'Staff') {
    const parts = [req.RequestForName || '—'];
    if (req.RequestForEmpCode) parts.push(req.RequestForEmpCode);
    if (req.RequestForDesignation) parts.push(req.RequestForDesignation);
    return parts.join(' - ');
  }
  return req.RequestForType + (req.RequestForDetails ? ' — ' + req.RequestForDetails : '');
}

  return `<div class="tab-btn ${active ? 'active' : ''}" data-tab="${id}">${label}</div>`;

    </tbody></table>` : '<p class="text-gray-400 text-sm">No approver entries yet.</p>';

    el.innerHTML = d.payments.length ? `<table class="data-table"><thead><tr><th>Date</th><th>Mode</th><th>UTR / Txn No</th><th>Paid Amount</th><th>Paid By</th><th>Remarks</th></tr></thead><tbody>
      ${d.payments.map(p => `<tr><td>${fmtDate(p.PaymentDate)}</td><td>${p.PaymentMode}</td><td>${p.UTRNo}</td><td class="font-bold">${fmtMoney(p.PaidAmount)}</td><td>${p.PaidByName || p.PaidBy}</td><td class="whitespace-normal max-w-xs">${p.PaymentRemarks||''}</td></tr>`).join('')}
    </tbody></table>` : '<p class="text-gray-400 text-sm">No payment recorded yet.</p>';
  }
  else if (tab === 'queries') {
    el.innerHTML = d.queries.length ? d.queries.map(q => `
      <div class="border border-gray-100 rounded-xl p-4 mb-3">
        <div class="flex justify-between items-center mb-2">
          <p class="text-xs font-bold text-gray-500">${q.RaisedBy} · ${fmtDateTime(q.RaisedAt)}</p>

        </div>
        <p class="text-sm mb-2">${q.QueryText}</p>
        ${q.ResponseText ? `<div class="bg-gray-50 rounded-lg p-3 mt-2"><p class="text-xs font-bold text-gray-500 mb-1">Response by ${q.RespondedBy} · ${fmtDateTime(q.RespondedAt)}</p><p class="text-sm">${q.ResponseText}</p></div>` : ''}
        ${(q.Status === 'Open' && STATE.user.role === 'Entry') ? `
          <div class="mt-3 flex gap-2">
            <input class="field" id="queryResp_${q.QueryID}" placeholder="Type your response...">
            <button class="btn btn-primary shrink-0" onclick="submitQueryResponse(this,'${q.QueryID}')">Respond</button>
          </div>` : ''}
      </div>`).join('') : '<p class="text-gray-400 text-sm">No queries raised.</p>';
  }
  else if (tab === 'activity') {
    el.innerHTML = `<div class="relative pl-5">
      ${d.activity.map((a,i) => `
        <div class="relative pb-5 ${i!==d.activity.length-1?'border-l-2 border-brand-100 ml-[3px]':''} pl-5">

        </div>`).join('')}

  }

async function submitQueryResponse(btnEl, queryId) {

      renderRequestDetail(STATE.currentDetailId);
    } catch (e) { toast(e.message, 'error'); }

// Returns the entry in arr with the latest value of dateField — used to
// carry the Commercial Audit amount into the Approver's default, and the
// Approver's amount into Payments' default, instead of always falling back
// to the original claim amount.
function latestOf(arr, dateField) {
  if (!arr || !arr.length) return null;
  return arr.reduce((latest, r) => (!latest || new Date(r[dateField]) >= new Date(latest[dateField])) ? r : latest, null);
}

function renderActionsPanel(req, d) {
  d = d || {};
  const latestAudit = latestOf(d.audit, 'AuditDate');
  const latestApproval = latestOf(d.approvals, 'ApprovalDate');
  const role = STATE.user.role;
  if (role === 'Entry') {
    if (req.Status === 'Draft' || req.Status === 'Returned') {
      return `<p class="text-sm text-gray-500 mb-4">This request can be routed to Commercial for audit.</p>
        <button class="btn btn-primary" onclick="doSendToCommercial(this,'${req.RequestID}')">Send to Commercial</button>`;
    }
    return `<p class="text-sm text-gray-400">No entry actions available at the current status (${req.Status}). Check the Queries tab if a response is required.</p>`;
  }
  if (role === 'Audit') {
    if (['Pending Commercial Audit','Under Audit','Waiting for Accounts Reply'].indexOf(req.Status) > -1) {
      return `
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div class="col-span-2"><label class="label">Audited By (Name)</label><input type="text" id="a_userName" class="field" value="${STATE.user.fullName}" placeholder="Enter the name of the person auditing this claim"></div>
        <div><label class="label">Audited Amount (₹)</label><input type="number" step="0.01" id="a_amount" class="field" value="${req.ClaimAmount}"></div>
        <div><label class="label">Audit Date</label><input type="date" id="a_date" class="field" value="${new Date().toISOString().slice(0,10)}"></div>
        <div class="col-span-2"><label class="label">Audit Remarks / Query Text</label><textarea id="a_remarks" class="field" rows="3"></textarea></div>
      </div>
      <div class="flex gap-3 mt-5">
        <button class="btn btn-green" onclick="doAudit(this,'${req.RequestID}','Approve')">Approve</button>
        <button class="btn btn-amber" onclick="doAudit(this,'${req.RequestID}','Query')">Raise Query</button>
        <button class="btn btn-red" onclick="doAudit(this,'${req.RequestID}','Return')">Return</button>
      </div>`;
    }
    if (req.Status === 'Audit Completed') {
      return `<p class="text-sm text-gray-500 mb-4">Audit is complete. Route this approved claim to the Payments team.</p>
        <button class="btn btn-primary" onclick="doSendToPayment(this,'${req.RequestID}')">Send to Payment</button>`;
    }
    if (req.Status === 'Pending Approval') {
      return `<p class="text-sm text-gray-400">This request has been approved and sent to the Approver. Awaiting their sign-off.</p>`;
    }
    return `<p class="text-sm text-gray-400">No audit actions available at the current status (${req.Status}).</p>`;
  }
  if (role === 'Approver') {
    if (req.Status === 'Pending Approval') {
      const defaultApproved = latestAudit ? latestAudit.AuditedAmount : req.ClaimAmount;
      const auditNote = latestAudit
        ? `<p class="text-xs text-gray-500 -mt-3 mb-1">Pre-filled from Commercial Audit: ${fmtMoney(latestAudit.AuditedAmount)} by ${latestAudit.AuditedUserName || latestAudit.AuditedUser}. Adjust if needed.</p>`
        : '';
      return `
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div class="col-span-2"><label class="label">Approved By (Name)</label><input type="text" id="ap_userName" class="field" value="${STATE.user.fullName}" placeholder="Enter the name of the approver"></div>
        <div class="col-span-2">${auditNote}<label class="label">Approved Amount (₹)</label><input type="number" step="0.01" id="ap_amount" class="field" value="${defaultApproved}"></div>
        <div><label class="label">Approval Date</label><input type="date" id="ap_date" class="field" value="${new Date().toISOString().slice(0,10)}"></div>
        <div class="col-span-2"><label class="label">Approval Remarks / Query Text</label><textarea id="ap_remarks" class="field" rows="3"></textarea></div>
      </div>
      <div class="flex gap-3 mt-5">
        <button class="btn btn-green" onclick="doApprover(this,'${req.RequestID}','Approve')">Approve & Send to Payment</button>
        <button class="btn btn-amber" onclick="doApprover(this,'${req.RequestID}','Query')">Raise Query</button>
        <button class="btn btn-red" onclick="doApprover(this,'${req.RequestID}','Return')">Return</button>
      </div>`;
    }
    return `<p class="text-sm text-gray-400">No approver actions available at the current status (${req.Status}).</p>`;
  }
  if (role === 'Viewer') {
    return `<p class="text-sm text-gray-400">You have view-only access to this request. Actions are not available for your account.</p>`;
  }
  if (role === 'Payments') {
    if (['Audit Completed','Pending Payment'].indexOf(req.Status) > -1) {
      const defaultPaid = latestApproval ? latestApproval.ApprovedAmount : (latestAudit ? latestAudit.AuditedAmount : req.ClaimAmount);
      const approvalNote = latestApproval
        ? `<p class="text-xs text-gray-500 -mt-3 mb-1">Pre-filled from Approver: ${fmtMoney(latestApproval.ApprovedAmount)} by ${latestApproval.ApprovedUserName || latestApproval.ApprovedUser}. Adjust if needed.</p>`
        : (latestAudit ? `<p class="text-xs text-gray-500 -mt-3 mb-1">Pre-filled from Commercial Audit: ${fmtMoney(latestAudit.AuditedAmount)}. Adjust if needed.</p>` : '');
      return `
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div><label class="label">Payment Date</label><input type="date" id="p_date" class="field" value="${new Date().toISOString().slice(0,10)}"></div>
        <div><label class="label">Payment Mode</label><select id="p_mode" class="field"><option>NEFT</option><option>RTGS</option><option>UPI</option><option>Cheque</option><option>Cash</option></select></div>
        <div><label class="label">UTR / Transaction No</label><input id="p_utr" class="field"></div>
        <div class="col-span-2">${approvalNote}<label class="label">Paid Amount (₹)</label><input type="number" step="0.01" id="p_amount" class="field" value="${defaultPaid}"></div>
        <div class="col-span-2"><label class="label">Payment Remarks</label><textarea id="p_remarks" class="field" rows="2"></textarea></div>
      </div>
      <div class="flex gap-3 mt-5">
        <button class="btn btn-primary" onclick="doProcessPayment(this,'${req.RequestID}')">Complete Payment</button>
      </div>`;
    }
    if (req.Status === 'Payment Released') {
      return `<p class="text-sm text-gray-500 mb-4">Payment has been released. Send the final acknowledgement to Commercial &amp; Accounts Entry.</p>
        <button class="btn btn-primary" onclick="doCompletePayment(this,'${req.RequestID}')">Send Acknowledgement & Close</button>`;
    }
    return `<p class="text-sm text-gray-400">No payment actions available at the current status (${req.Status}).</p>`;
  }
  return '';
}

// Renders the small detail sub-table used when a group/month summary row is
// expanded, showing every underlying request that rolled into that total.
// Field names here match what getReports() actually returns from the
// backend (buildReportRow_): EntryPersonName, MailApproverName, ClaimantName,
// RequestForName, etc.
function detailSubTable(items) {
  if (!items || !items.length) return '<p class="text-xs text-gray-400 py-2">No line items.</p>';
  return `<table class="data-table text-xs"><thead><tr>
      <th>Request ID</th><th>Entry Date</th><th>Entry Person</th><th>Mail Approver</th><th>Claimant</th><th>Team</th><th>Request For</th><th>Subject</th><th>Claim Type</th><th>Amount</th><th>Status</th>
    </tr></thead><tbody>
    ${items.map(it => `<tr class="cursor-pointer" onclick="event.stopPropagation();navigate('requestDetail',{requestId:'${it.RequestID}'})">
      <td class="font-bold text-brand-700">${it.RequestID}</td><td>${fmtDate(it.EntryDate)}</td><td>${it.EntryPersonName||it.CreatedBy||'—'}</td>
      <td>${it.MailApproverName ? it.MailApproverName + (it.MailApprovalDate ? ' · ' + fmtDate(it.MailApprovalDate) : '') : '—'}</td>
      <td>${it.ClaimantName||'—'}</td><td>${it.Team||'—'}</td><td>${it.RequestForName||'—'}</td>
      <td class="max-w-[160px] truncate">${it.Subject||''}</td><td>${it.ClaimType||''}</td><td class="font-bold">${fmtMoney(it.ClaimAmount)}</td><td>${statusPill(it.Status)}</td>
    </tr>`).join('')}
    </tbody></table>`;
}

// The backend now returns a flat list of fully-detailed rows for every
// report type (see getReports() / buildReportRow_ in Code.gs). The
// grouped report types (employee-wise, party-wise, team-wise,
// claim-type-wise, monthly-summary) still need a name/count/total/items
// view for display, so we group the flat rows client-side here rather
// than relying on the backend to pre-aggregate them.
function groupReportRows(type, rows) {
  const keyFn = {
    'employee-wise': r => r.ClaimantName || '(No name)',
    'party-wise': r => r.Department || '(No department)',
    'team-wise': r => r.Team || '(No team)',
    'claim-type-wise': r => r.ClaimType || '(No claim type)',
    'monthly-summary': r => r.Month || '(No month)'
  }[type];
  if (!keyFn) return rows;

  const groups = {};
  const order = [];
  rows.forEach(r => {
    const key = keyFn(r);
    if (!groups[key]) { groups[key] = { name: key, month: key, count: 0, total: 0, items: [] }; order.push(key); }
    groups[key].count += 1;
    groups[key].total += Number(r.ClaimAmount) || 0;
    groups[key].items.push(r);
  });
  return order.map(k => groups[k]);
}

async function loadReport(type) {
  document.querySelectorAll('[data-report]').forEach(b => b.classList.toggle('active', b.dataset.report === type));
  document.getElementById('reportTitle').textContent = REPORT_TYPES.find(r => r.id===type).label;
  const el = document.getElementById('reportContent');
  el.innerHTML = '<p class="text-gray-400 text-sm">Loading...</p>';
  let data = [];
  try {
    const reportPayload = STATE.user.role === 'Viewer' ? { type, teamAccess: STATE.user.teamAccess } : { type };
    data = (await api('getReports', reportPayload)).data;
  } catch (e) { toast(e.message, 'error'); }
  // STATE._reportData keeps the raw flat detail rows (as returned by the
  // backend) — this is what exportReportExcel uses for a full detailed
  // export regardless of report type.
  STATE._reportData = data; STATE._reportType = type;

  if (!data.length) { el.innerHTML = '<p class="text-gray-400 text-sm py-6 text-center">No data available.</p>'; return; }

  const GROUPED_TYPES = ['employee-wise','party-wise','team-wise','claim-type-wise','monthly-summary'];

  if (GROUPED_TYPES.indexOf(type) > -1) {
    const grouped = groupReportRows(type, data);
    const labelKey = type === 'monthly-summary' ? 'month' : 'name';
    const labelHeader = type === 'monthly-summary' ? 'Month' : 'Name';
    el.innerHTML = `<table class="data-table"><thead><tr><th></th><th>${labelHeader}</th><th>Request Count</th><th>Total Amount</th></tr></thead><tbody>
      ${grouped.map((r,i) => `
        <tr class="cursor-pointer" onclick="toggleReportGroup(${i})">
          <td class="w-5 text-gray-300" id="rg_caret_${i}">▸</td><td class="font-bold">${r[labelKey]}</td><td>${r.count}</td><td class="font-bold">${fmtMoney(r.total)}</td>
        </tr>
        <tr id="rg_row_${i}" class="hidden"><td colspan="4" class="bg-gray-50/70">${detailSubTable(r.items)}</td></tr>`).join('')}
    </tbody></table>`;
  } else if (['pending-audit','pending-payment','completed'].indexOf(type) > -1) {
    el.innerHTML = `<table class="data-table"><thead><tr><th>Request ID</th><th>Entry Date</th><th>Entry Person</th><th>Claimant</th><th>Team</th><th>Claim Type</th><th>Amount</th><th>Status</th></tr></thead><tbody>
      ${data.map(r => `<tr class="cursor-pointer" onclick="navigate('requestDetail',{requestId:'${r.RequestID}'})"><td class="font-bold text-brand-700">${r.RequestID}</td><td>${fmtDate(r.EntryDate)}</td><td>${r.EntryPersonName||r.CreatedBy||'—'}</td><td>${r.ClaimantName||'—'}</td><td>${r.Team||'—'}</td><td>${r.ClaimType}</td><td>${fmtMoney(r.ClaimAmount)}</td><td>${statusPill(r.Status)}</td></tr>`).join('')}
    </tbody></table>`;
  } else if (type === 'audit-register') {
    el.innerHTML = `<table class="data-table"><thead><tr><th>Request ID</th><th>Date</th><th>Claimant</th><th>Team</th><th>Audited By</th><th>Amount</th><th>Action</th></tr></thead><tbody>
      ${data.map(r => `<tr class="cursor-pointer" onclick="navigate('requestDetail',{requestId:'${r.RequestID}'})"><td class="font-bold text-brand-700">${r.RequestID}</td><td>${fmtDate(r.AuditDate)}</td><td>${r.ClaimantName||'—'}</td><td>${r.Team||'—'}</td><td>${r.AuditedBy||'—'}</td><td>${fmtMoney(r.AuditedAmount)}</td><td>${statusPill(r.AuditAction)}</td></tr>`).join('')}
    </tbody></table>`;
  } else if (type === 'payment-register') {
    el.innerHTML = `<table class="data-table"><thead><tr><th>Request ID</th><th>Date</th><th>Claimant</th><th>Team</th><th>Mode</th><th>UTR</th><th>Paid Amount</th></tr></thead><tbody>
      ${data.map(r => `<tr class="cursor-pointer" onclick="navigate('requestDetail',{requestId:'${r.RequestID}'})"><td class="font-bold text-brand-700">${r.RequestID}</td><td>${fmtDate(r.PaymentDate)}</td><td>${r.ClaimantName||'—'}</td><td>${r.Team||'—'}</td><td>${r.PaymentMode||'—'}</td><td>${r.UTRNo||'—'}</td><td class="font-bold">${fmtMoney(r.PaidAmount)}</td></tr>`).join('')}
    </tbody></table>`;
  }
}

function toggleReportGroup(i) {
  const row = document.getElementById('rg_row_' + i);
  const caret = document.getElementById('rg_caret_' + i);
  if (!row) return;
  const hidden = row.classList.toggle('hidden');
  caret.textContent = hidden ? '▸' : '▾';
}

// Report rows come back from the backend with raw date values (Apps Script
// serializes sheet Date cells to full ISO strings, e.g.
// "2026-06-30T18:30:00.000Z"). The on-screen tables already run these
// through fmtDate(), but the Excel export was writing them straight through
// unformatted. This picks out every known date-ish field on a report row
// and rewrites it as a plain dd-mmm-yyyy string before export.
const REPORT_DATE_FIELDS = ['EntryDate','MailReceivedDate','MailApprovalDate','AuditDate','ApprovalDate','PaymentDate'];
function exportDateStr_(v) {
  if (!v) return '';
  const dt = new Date(v);
  if (isNaN(dt)) return v;
  return dt.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
}
function formatRowDatesForExport(row) {
  const out = Object.assign({}, row);
  REPORT_DATE_FIELDS.forEach(f => { if (f in out) out[f] = exportDateStr_(out[f]); });
  return out;
}

// Builds a workbook that's a genuine detailed register: for group/month
// reports it writes a "Summary" sheet (name/count/total) plus a "Detail"
// sheet with every underlying request line item; for row-level report
// types (pending lists, audit/payment registers) it exports the full set
// of columns already returned by the backend, not a trimmed-down view.
function exportReportExcel(btnEl) {
  const data = STATE._reportData || [];
  if (!data.length) { toast('Nothing to export.', 'error'); return; }
  withButtonLoading(btnEl, async () => {
    const wb = XLSX.utils.book_new();
    const hasItems = data.some(r => Array.isArray(r.items));
    if (hasItems) {
      const summaryRows = data.map(r => ({ Name: r.name || r.month, 'Request Count': r.count, 'Total Amount': r.total }));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summaryRows), 'Summary');
      const detailRows = [];
      data.forEach(group => (group.items || []).forEach(item => detailRows.push(Object.assign({ Group: group.name || group.month }, formatRowDatesForExport(item)))));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(detailRows), 'Detail');
    } else {
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data.map(formatRowDatesForExport)), STATE._reportType.slice(0,31));
    }
    XLSX.writeFile(wb, 'Report_' + STATE._reportType + '.xlsx');
    toast('Detailed report downloaded.');
  });
}

/* =========================================================
   REIMBURSEMENT SUMMARY DOCUMENT (View / Print / PDF)
========================================================= */
async function openSummaryModal(requestId) {
  let d;
  try { d = (await api('getSummary', { requestId })).data; }
  catch (e) { toast(e.message, 'error'); return; }
  const req = d.request;
  const host = document.getElementById('modalHost');
  host.innerHTML = `
  <div class="modal-backdrop" onclick="if(event.target===this) closeModal()">
    <div class="bg-white rounded-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between p-5 border-b border-gray-100 sticky top-0 bg-white z-10">
        <h3 class="font-display font-bold text-gray-800">Reimbursement Summary — ${req.RequestID}</h3>
        <div class="flex gap-2">
          <button class="btn btn-outline" onclick="window.print()">Print</button>
          <button class="btn btn-primary" onclick="downloadSummaryPDF('${req.RequestID}')">Download PDF</button>
          <button class="btn btn-outline" onclick="closeModal()">✕</button>
        </div>
      </div>
      <div id="printArea" class="p-8">
        ${buildSummaryHtml(d)}
      </div>
    </div>
  </div>`;
}

function buildSummaryHtml(d) {
  const req = d.request;
  return `
  <div class="border-b-2 border-brand-600 pb-4 mb-5 flex justify-between items-start">
    <div>
      <h2 class="text-xl font-display font-extrabold text-brand-700">${d.companyName || 'Pristine Pearl Pharma Pvt Ltd'}</h2>
      <p class="text-xs text-gray-400">Reimbursement Summary Document</p>
    </div>
    <img src="${d.qrUrl}" crossorigin="anonymous" class="w-20 h-20" alt="QR Code">
  </div>
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-5">
    ${infoItem('Request ID', req.RequestID)}
    ${infoItem('Status', req.Status)}
    ${req.PartyType === 'Direct'
      ? infoItem('Claimant', (req.DirectName||'—') + ' (' + (req.DirectType||'Direct') + ')')
      : infoItem('Employee', req.EmployeeName + ' (' + req.EmployeeCode + ')')}
    ${infoItem('Designation', req.Designation||'—')}
    ${infoItem('Department', req.Department||'—')}
    ${infoItem('Team', req.Team||'—')}
    ${infoItem('Location', req.Location||'—')}
    ${infoItem('Claim Type', req.ClaimType)}
    ${infoItem('Request For', formatRequestFor(req))}
    ${infoItem('Claim Amount', fmtMoney(req.ClaimAmount))}
    ${infoItem('Entry Date', fmtDate(req.EntryDate))}
    ${infoItem('Entry Person', req.EntryPersonName || req.CreatedBy || '—')}
    ${infoItem('Mail Approver', req.MailApproverName ? req.MailApproverName + (req.MailApprovalDate?(' · '+fmtDate(req.MailApprovalDate)):'') : '—')}
    ${infoItem('Subject', req.Subject)}
  </div>
  <div class="mb-5">
    <h4 class="font-bold text-sm text-gray-700 mb-2 border-b pb-1">Commercial Audit</h4>
    ${d.audit.length ? d.audit.map(a => `<p class="text-sm mb-1">${fmtDate(a.AuditDate)} — ${a.AuditedUserName || a.AuditedUser} — ${fmtMoney(a.AuditedAmount)} — <b>${a.AuditAction}</b> ${a.AuditRemarks?('— '+a.AuditRemarks):''}</p>`).join('') : '<p class="text-sm text-gray-400">Not yet audited.</p>'}
  </div>
  <div class="mb-5">
    <h4 class="font-bold text-sm text-gray-700 mb-2 border-b pb-1">Approver</h4>
    ${(d.approvals && d.approvals.length) ? d.approvals.map(a => `<p class="text-sm mb-1">${fmtDate(a.ApprovalDate)} — ${a.ApprovedUserName || a.ApprovedUser} — ${fmtMoney(a.ApprovedAmount)} — <b>${a.ApprovalAction}</b> ${a.ApprovalRemarks?('— '+a.ApprovalRemarks):''}</p>`).join('') : '<p class="text-sm text-gray-400">Not yet reviewed by Approver.</p>'}
  </div>
  <div class="mb-5">
    <h4 class="font-bold text-sm text-gray-700 mb-2 border-b pb-1">Payment Details</h4>
    ${d.payments.length ? d.payments.map(p => `<p class="text-sm mb-1">${fmtDate(p.PaymentDate)} — ${p.PaymentMode} — UTR: ${p.UTRNo} — <b>${fmtMoney(p.PaidAmount)}</b> — ${p.PaidByName || p.PaidBy}</p>`).join('') : '<p class="text-sm text-gray-400">Payment pending.</p>'}
  </div>
  <div class="mb-5">
    <h4 class="font-bold text-sm text-gray-700 mb-2 border-b pb-1">Attachment List</h4>
    ${d.attachments.length ? `<ul class="list-disc pl-5 text-sm space-y-0.5">${d.attachments.map(a => `<li>${a.FileName} (${a.Category})</li>`).join('')}</ul>` : '<p class="text-sm text-gray-400">No attachments.</p>'}
  </div>
  <div>
    <h4 class="font-bold text-sm text-gray-700 mb-2 border-b pb-1">Activity History</h4>
    ${d.activity.map(a => `<p class="text-xs text-gray-600 mb-1">${fmtDateTime(a.Timestamp)} — <b>${a.Action}</b> by ${a.PerformedBy}</p>`).join('')}
  </div>`;
}

function closeModal() { document.getElementById('modalHost').innerHTML = ''; }

async function downloadSummaryPDF(requestId) {
  const el = document.getElementById('printArea');
  const canvas = await html2canvas(el, { scale: 2, useCORS: true, allowTaint: false });
  const imgData = canvas.toDataURL('image/png');
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p', 'pt', 'a4');
  const pageWidth = pdf.internal.pageSize.getWidth();
  const imgHeight = (canvas.height * pageWidth) / canvas.width;
  pdf.addImage(imgData, 'PNG', 0, 0, pageWidth, imgHeight);
  pdf.save('Reimbursement_' + requestId + '.pdf');
}
