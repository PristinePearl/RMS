<!-- PERF: xlsx / jspdf / html2canvas are only needed for Excel export and
     PDF summary downloads, not for the initial login/dashboard render.
     They're loaded on demand via loadLib() the first time a user actually
     clicks an export/download action — see ensureExcelLib()/ensurePdfLibs()
     below. This removes ~1MB+ of blocking JS from first load, which matters
     most on mobile connections. -->
<script>
  window.LAZY_LIBS = {
    xlsx: 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
    jspdf: 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js',
    html2canvas: 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'
  };
  window._loadedLibs = {};
  function loadLib(name) {
    if (window._loadedLibs[name]) return window._loadedLibs[name];
    window._loadedLibs[name] = new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = window.LAZY_LIBS[name];
      s.onload = resolve;
      s.onerror = () => { delete window._loadedLibs[name]; reject(new Error('Failed to load ' + name + '. Check your connection and try again.')); };
      document.head.appendChild(s);
    });
    return window._loadedLibs[name];
  }
  async function ensureExcelLib() { if (typeof XLSX === 'undefined') await loadLib('xlsx'); }
  async function ensurePdfLibs() {
    await Promise.all([
      typeof html2canvas === 'undefined' ? loadLib('html2canvas') : null,
      typeof window.jspdf === 'undefined' ? loadLib('jspdf') : null
    ]);
  }
</script>

  #printArea.layout-compact table.remarks-table td.remarks-cell{padding:.1rem .26rem!important;}
  #printArea.layout-fitpage{padding:.55rem!important;}
  #printArea.layout-fitpage .text-xl{font-size:.92rem!important;}
  #printArea.layout-fitpage .text-sm{font-size:.62rem!important;}
  #printArea.layout-fitpage .text-xs{font-size:.55rem!important;}
  #printArea.layout-fitpage .mb-5{margin-bottom:.3rem!important;}
  #printArea.layout-fitpage .mb-1{margin-bottom:.06rem!important;}
  #printArea.layout-fitpage .gap-4{gap:.3rem!important;}
  #printArea.layout-fitpage .w-20{width:2.1rem!important;height:2.1rem!important;}
  #printArea.layout-fitpage table.remarks-table{font-size:.5rem!important;}
  #printArea.layout-fitpage table.remarks-table td.remarks-cell{padding:.06rem .18rem!important;}
  @media print{
    /* BLANK FIRST PAGE FIX: visibility:hidden only hides content visually —
       it does NOT reclaim layout space. The sidebar/main app shell use
       min-h-screen, so even hidden they were still ~100vh tall, pushing the
       actual summary content down onto page 2 and leaving page 1 blank.
       display:none removes them from layout entirely, so printing starts
       right at the summary content. */
    #globalLoadingBar, #toastHost, #loginView, #appShell{display:none!important;}
    #modalHost{display:block!important;}
    .modal-backdrop{position:static!important;background:none!important;backdrop-filter:none!important;padding:0!important;display:block!important;inset:auto!important;}
    #summaryModalBox{max-height:none!important;overflow:visible!important;box-shadow:none!important;border-radius:0!important;max-width:none!important;}
    #summaryModalHeader{display:none!important;}
    #printArea{position:static!important;width:auto!important;}

</style>
</head>

let __busyCount = 0;
function __setBusy(on) {
  const bar = document.getElementById('globalLoadingBar');
  if (on) {
    __busyCount++;
    document.body.classList.add('is-busy');
    if (bar) bar.classList.add('active');
  } else {
    __busyCount = Math.max(0, __busyCount - 1);
    if (__busyCount === 0) {
      document.body.classList.remove('is-busy');
      if (bar) bar.classList.remove('active');
    }
  }
}

// Every action in the app (save, audit, approve, send-to-payment, report
// loads, etc.) funnels through this one function, so this is the single
// place that switches on the loading animation — a top progress bar plus
// a soft dim/disable on every .btn while the request is in flight.
async function api(action, payload) {
  if (!API_URL || API_URL.indexOf('PASTE_YOUR') === 0) {
    throw new Error('Backend URL not configured yet. Paste your Apps Script Web App URL into API_URL in the script.');
  }
  __setBusy(true);
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action, payload: payload || {} })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Request failed');
    return data;
  } finally {
    __setBusy(false);
  }
}

// Wraps a specific button's click handler so that button (not just the
// global bar) shows its own inline spinner and is disabled for the
// duration of the async action — used for the primary workflow actions
// (Approve / Query / Return / Send / Process Payment, etc).
async function withButtonLoading(btnEl, fn) {
  if (!btnEl) return fn();
  btnEl.classList.add('is-loading');
  btnEl.disabled = true;
  try {
    return await fn();
  } finally {
    btnEl.classList.remove('is-loading');
    btnEl.disabled = false;
  }
}

function toast(msg, type) {
  type = type || 'success';
  const colors = { success:'bg-emerald-500', error:'bg-red-500', info:'bg-indigo-500' };
  const el = document.createElement('div');
  el.className = 'toast ' + colors[type] + ' text-white text-sm font-semibold px-4 py-3 rounded-xl shadow-lg';
  el.textContent = msg;
  document.getElementById('toastHost').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = '.3s'; setTimeout(() => el.remove(), 300); }, 3200);
}

function fmtMoney(n) {
  n = Number(n) || 0;
  return '₹' + n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
}
function fmtDateTime(d) {
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  return dt.toLocaleString('en-IN', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}
function statusPill(status) {
  const cls = STATUS_COLORS[status] || 'bg-gray-100 text-gray-600';
  return `<span class="status-pill ${cls}">${status}</span>`;
}
// Escapes text for safe HTML insertion.
function escHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
// Renders a Remarks value, preserving line breaks and — if the text looks
// like it was pasted from Excel (tab-separated cells across 2+ lines) —
// rendering it as an actual HTML table instead of one flattened line.
function formatRemarks(text) {
  if (!text) return '';
  const raw = String(text).replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const lines = raw.split('\n').filter(l => l.length > 0);
  const tabLines = lines.filter(l => l.indexOf('\t') > -1);
  // Case 1: genuine Excel paste — tab-separated cells (possibly many columns).
  if (tabLines.length >= 1 && tabLines.length >= lines.length * 0.6) {
    const rows = lines.map(l => l.split('\t'));
    const colCount = Math.max(...rows.map(r => r.length));
    const rowsHtml = rows.map(r => {
      const cells = [];
      for (let i = 0; i < colCount; i++) cells.push(`<td class="remarks-cell">${escHtml(r[i] || '')}</td>`);
      return `<tr>${cells.join('')}</tr>`;
    }).join('');
    return `<table class="remarks-table">${rowsHtml}</table>`;
  }
  // Case 2: structured "Label - Value" / "Label: Value" lines (common for the
  // Spon Type / Dr Name / Area etc. template) — render as a 2-column table.
  const kvSep = / -\s?|:\s/;
  const kvLines = lines.filter(l => kvSep.test(l));
  if (lines.length >= 2 && kvLines.length >= lines.length * 0.6) {
    const rowsHtml = lines.map(l => {
      const m = l.match(kvSep);
      if (!m) return `<tr><td class="remarks-cell" colspan="2">${escHtml(l)}</td></tr>`;
      const idx = m.index;
      const label = l.slice(0, idx);
      const value = l.slice(idx + m[0].length);
      return `<tr><td class="remarks-cell remarks-label">${escHtml(label)}</td><td class="remarks-cell">${escHtml(value)}</td></tr>`;
    }).join('');
    return `<table class="remarks-table">${rowsHtml}</table>`;
  }
  // Case 3: "Label   Value" lines where columns are lined up with multiple
  // spaces instead of a real tab or a dash (e.g. text typed/pasted with
  // padding to keep it visually aligned in its original source). Plain HTML
  // collapses repeated spaces to one, which is what was flattening these
  // onto a single run — so catch the pattern here and render it as a table
  // instead of relying on whitespace being preserved.
  const spaceSep = /\s{2,}/;
  const spaceLines = lines.filter(l => spaceSep.test(l.trim()));
  if (lines.length >= 2 && spaceLines.length >= lines.length * 0.6) {
    const rowsHtml = lines.map(l => {
      const trimmed = l.trim();
      const m = trimmed.match(spaceSep);
      if (!m) return `<tr><td class="remarks-cell" colspan="2">${escHtml(trimmed)}</td></tr>`;
      const idx = m.index;
      const label = trimmed.slice(0, idx);
      const value = trimmed.slice(idx + m[0].length);
      return `<tr><td class="remarks-cell remarks-label">${escHtml(label)}</td><td class="remarks-cell">${escHtml(value)}</td></tr>`;
    }).join('');
    return `<table class="remarks-table">${rowsHtml}</table>`;
  }
  // Otherwise just preserve the line breaks the user typed / pasted.
  return escHtml(raw).replace(/\n/g, '<br>');
}
// CORPORATE CARD: mirrors the backend's isCorporateCardClaim_() so the UI
// can show a badge without waiting on a round trip — the backend remains
// the source of truth for the actual workflow/status logic.
function isCorporateCardSubject(subject) {
  if (!subject) return false;
  const s = String(subject).toLowerCase();
  return s.indexOf('corporate card') > -1 || s.indexOf('corporate') > -1 || s.indexOf('icici') > -1;
}
function corporateCardBadge(subject) {
  return isCorporateCardSubject(subject)
    ? '<span class="status-pill bg-violet-100 text-violet-700 ml-2">Corporate Card</span>'
    : '';
}
function initials(name) {
  if (!name) return '?';
  return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
}

async function renderDashboard() {
  const c = document.getElementById('viewContainer');
  const df = STATE.dateFilters.dashboard;
  const dashPayload = Object.assign(
    STATE.user.role === 'Viewer' ? { teamAccess: STATE.user.teamAccess } : {},
    { fromDate: df.from, toDate: df.to }
  );
  const corpPayload = STATE.user.role === 'Viewer' ? { teamAccess: STATE.user.teamAccess } : {};

  // PERF: both requests are independent of each other, so fire them
  // together instead of awaiting one after the other — this roughly
  // halves the time-to-render on the dashboard, which matters most on
  // slower mobile connections. allSettled means a failure on one call
  // doesn't block the other from rendering with its own data.
  const [dashResult, corpResult] = await Promise.allSettled([
    api('getDashboard', dashPayload),
    api('getCorporateCardDashboard', corpPayload)
  ]);

  let d;
  if (dashResult.status === 'fulfilled') {
    d = dashResult.value.data;
  } else {
    d = { totalRequests:0, pendingVerification:0, pendingAudit:0, pendingApproval:0, pendingPayment:0, completed:0, returned:0, totalClaimValue:0, totalAuditedValue:0, totalPaidValue:0, statusBreakdown:{}, claimTypeBreakdown:{}, monthly:{} };
    toast('Showing empty dashboard — connect backend for live data', 'info');
  }

  let corp;
  if (corpResult.status === 'fulfilled') {
    corp = corpResult.value.data;
  } else {
    corp = { entries:0, auditPending:0, auditedApproved:0, totalClaimValue:0, statusBreakdown:{} };
  }

  // PENDING-COUNT ACCURACY: the backend's aggregate fields (pendingVerification,
  // pendingAudit, pendingPayment) only count the single "base" status (e.g. just
  // "Pending Verification"), but each pending tab's actual list also includes
  // "Under Verification/Audit", "Query Raised" and "Waiting for Accounts Reply"
  // requests. That mismatch is what made the sidebar badge (e.g. "1") disagree
  // with the "N requests" count shown once you open the tab (e.g. "3"). Fix it
  // by summing the exact per-status counts from statusBreakdown using the same
  // status list each tab filters on, so the badge always matches the list.
  const sumStatusCounts = (breakdown, statuses) =>
    statuses.reduce((sum, s) => sum + ((breakdown && breakdown[s]) || 0), 0);

  const verificationPendingCount = sumStatusCounts(d.statusBreakdown,
    ['Pending Verification', 'Under Verification', 'Query Raised', 'Waiting for Accounts Reply']);
  const auditPendingCount = sumStatusCounts(d.statusBreakdown,
    ['Pending Commercial Audit', 'Under Audit', 'Query Raised', 'Waiting for Accounts Reply']);
  const paymentPendingCount = sumStatusCounts(d.statusBreakdown,
    ['Audit Completed', 'Pending Payment']);

  // PENDING APPROVAL COUNT: getDashboard doesn't return a dedicated
  // pendingApproval field (only Verification/Audit/Payment are aggregated
  // server-side), so fall back to reading it out of the status breakdown,
  // which already carries a "Pending Approval" bucket for the chart.
  const pendingApprovalCount = (typeof d.pendingApproval === 'number' && d.pendingApproval > 0)
    ? d.pendingApproval
    : ((d.statusBreakdown && d.statusBreakdown['Pending Approval']) || 0);

  // Reflect current pending counts as badges on the sidebar tabs.
  setNavBadge('pendingVerification', verificationPendingCount);
  setNavBadge('pendingAudit', auditPendingCount);
  setNavBadge('pendingApproval', pendingApprovalCount);
  setNavBadge('pendingPayment', paymentPendingCount);
  setNavBadge('verificationPendingTab', verificationPendingCount);
  setNavBadge('auditPendingTab', auditPendingCount);
  setNavBadge('approvalPendingTab', pendingApprovalCount);
  setNavBadge('paymentPendingTab', paymentPendingCount);
  setNavBadge('corporateCardDashboard', corp.auditPending);

  const cards = [
    { label:'Total Requests', value:d.totalRequests, grad:'grad-purple', icon:'list' },
    { label:'Pending Verification', value:verificationPendingCount, grad:'grad-blue', icon:'check' },
    { label:'Pending Audit', value:auditPendingCount, grad:'grad-orange', icon:'check' },
    { label:'Pending Payment', value:paymentPendingCount, grad:'grad-blue', icon:'cash' },
    { label:'Completed', value:d.completed, grad:'grad-green', icon:'check' },
    { label:'Returned', value:d.returned, grad:'grad-red', icon:'list' },
  ];
  const moneyCards = [
    { label:'Total Claim Value', value: fmtMoney(d.totalClaimValue), grad:'grad-purple' },
    { label:'Total Audited Value', value: fmtMoney(d.totalAuditedValue), grad:'grad-blue' },
    { label:'Total Paid Value', value: fmtMoney(d.totalPaidValue), grad:'grad-green' },
  ];

  c.innerHTML = `
    ${dateFilterBarHtml('dashboard', 'renderDashboard()')}

function drawChart(id, type, labels, datasets) {
  const ctx = document.getElementById(id);
  if (!ctx) return;
  if (STATE.charts[id]) STATE.charts[id].destroy();
  STATE.charts[id] = new Chart(ctx, {
    type, data: { labels, datasets },
    options: { responsive:true, plugins:{ legend:{ display: type==='doughnut', position:'bottom', labels:{ boxWidth:10, font:{size:10} } } }, scales: type==='doughnut' ? {} : { y:{ beginAtZero:true } } }
  });
}

async function quickEmpLookup(codeInputId) {
  const code = document.getElementById(codeInputId).value.trim();
  if (!code) { toast('Enter an Emp ID first.', 'error'); return null; }
  const employees = await fetchAllEmployees();
  const cl = code.toLowerCase();
  let match = employees.find(e => String(pickField(e, ['Emp Id','Employee Code','EmpId'])).toLowerCase() === cl);
  if (!match) match = employees.find(e => Object.values(e).some(v => String(v).toLowerCase().includes(cl)));
  return match || null;
}

function fileDropZone(category, label, multiple) {
  return `
  <div>
    <label class="label">${label}</label>
    <label class="flex flex-col items-center justify-center border-2 border-dashed border-gray-200 rounded-xl py-5 cursor-pointer hover:border-brand-400 hover:bg-brand-50/40 transition">
      <svg class="w-6 h-6 text-brand-500 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
      <span class="text-xs text-gray-500 font-semibold">Click to upload</span>
      <input type="file" class="hidden" ${multiple ? 'multiple' : ''} onchange="handleFileSelect(event,'${category}')">
    </label>
    <div id="fileList_${category}" class="mt-2 space-y-1"></div>
  </div>`;
}

function handleFileSelect(evt, category) {
  const files = Array.from(evt.target.files);
  const readers = files.map(f => new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve({ name: f.name, mimeType: f.type || 'application/octet-stream', base64: reader.result.split(',')[1], category });
    reader.readAsDataURL(f);
  }));
  Promise.all(readers).then(results => {
    if (category === 'Attachment') STATE.pendingFiles.Attachment.push(...results);
    else STATE.pendingFiles[category] = results;
    renderFileList(category);
  });
}

function renderFileList(category) {
  const list = category === 'Attachment' ? STATE.pendingFiles.Attachment : STATE.pendingFiles[category];
  const el = document.getElementById('fileList_' + category);
  if (!el) return;
  el.innerHTML = list.map((f, i) => `
    <div class="flex items-center justify-between bg-gray-50 rounded-lg px-3 py-1.5 text-xs">
      <span class="truncate">${f.name}</span>
      <button onclick="removeFile('${category}', ${i})" class="text-red-400 hover:text-red-600 font-bold ml-2">✕</button>
    </div>`).join('');
}
function removeFile(category, idx) {
  if (category === 'Attachment') STATE.pendingFiles.Attachment.splice(idx, 1);
  else STATE.pendingFiles[category] = [];
  renderFileList(category);
}

// Your Manpower Code.gs only routes action=getAllEmployees (and getSummaryStats)
// through doGet/doPost — there is no "search" action wired up, so we fetch the
// full employee list once, cache it in memory, and filter client-side.
async function fetchAllEmployees() {
  if (STATE.employeeCache) return STATE.employeeCache;
  const url = MANPOWER_API_URL + '?action=getAllEmployees';
  let res;
  try {
    res = await fetch(url);
  } catch (e) {
    throw new Error('Network error reaching the Manpower system. Check your connection.');
  }
  const text = await res.text();
  let data;
  try {
    data = JSON.parse(text);
  } catch (e) {
    // The response wasn't JSON — almost always means the Manpower web app
    // returned an HTML page (a Google sign-in page or an Apps Script error
    // page) instead of data. Give an actionable message instead of the raw
    // "Unexpected token '<'" parse error.
    throw new Error('Manpower system returned a webpage instead of data. Check that the Manpower web app is deployed with "Who has access: Anyone" and that MANPOWER_API_URL points at the latest /exec deployment.');
  }
  if (!data.success) throw new Error(data.error || 'Manpower API returned an error.');
  STATE.employeeCache = data.employees || [];
  return STATE.employeeCache;
}

// Field names come straight from the Manpower sheet headers (e.g. "Emp Id",
// "Employee Name", "Department", "Short Designation", "Current City", "HQ").
// We try a few likely header variants since exact casing/wording can differ.
function pickField(emp, candidates) {
  for (const key of candidates) {
    if (emp[key] !== undefined && emp[key] !== '') return emp[key];
  }
  // fallback: case-insensitive partial match on header name
  const lowerCandidates = candidates.map(c => c.toLowerCase());
  for (const k of Object.keys(emp)) {
    if (lowerCandidates.some(c => k.toLowerCase().includes(c.toLowerCase()) || c.toLowerCase().includes(k.toLowerCase()))) {
      if (emp[k]) return emp[k];
    }
  }
  return '';
}

async function lookupEmployee(btnEl) {
  const q = document.getElementById('empSearch').value.trim();
  const resultEl = document.getElementById('empResult');
  if (!q) return;
  resultEl.innerHTML = '<p class="text-xs text-gray-400">Searching Manpower system...</p>';
  await withButtonLoading(btnEl, async () => {
  try {
    const employees = await fetchAllEmployees();
    const ql = q.toLowerCase();
    const matches = employees.filter(emp =>
      Object.values(emp).some(v => String(v).toLowerCase().includes(ql))
    ).slice(0, 8);

    if (!matches.length) {
      resultEl.innerHTML = '<p class="text-xs text-red-500">No matching employee found. You can enter details manually below.</p>';
      return;
    }
    if (matches.length === 1) {
      applyEmployee(matches[0]);
      return;
    }
    // multiple matches — let the user pick
    resultEl.innerHTML = `<p class="text-xs text-gray-500 font-semibold mb-2">${matches.length} matches — select one:</p>` +
      matches.map((emp, i) => {
        const name = pickField(emp, ['Employee Name','Name']);
        const code = pickField(emp, ['Emp Id','Employee Code','EmpId']);
        const dept = pickField(emp, ['Department']);
        return `<div class="flex items-center gap-3 bg-gray-50 hover:bg-brand-50 border border-gray-200 rounded-xl px-4 py-2.5 mb-2 cursor-pointer" onclick='selectEmployeeMatch(${i})'>
          <div class="w-8 h-8 rounded-full bg-brand-500 text-white flex items-center justify-center font-bold text-xs shrink-0">${initials(name)}</div>
          <div class="min-w-0"><p class="text-sm font-bold text-gray-800 truncate">${name}</p><p class="text-xs text-gray-500">${code} · ${dept}</p></div>
        </div>`;
      }).join('');
    STATE._empMatches = matches;
  } catch (e) {
    resultEl.innerHTML = `<p class="text-xs text-red-500">Could not reach Manpower system (${e.message}). Enter employee details manually.</p>`;
  }
  });
}

function selectEmployeeMatch(i) {
  applyEmployee(STATE._empMatches[i]);
}

function applyEmployee(emp) {

  const name = pickField(emp, ['Employee Name','Name']);

  const team = pickField(emp, ['Team']);
  const location = pickField(emp, ['Current City','HQ','Current State']);

async function submitRequest(btnEl, sendToVerifier) {
  const partyType = document.querySelector('input[name="f_partyType"]:checked').value;
  const requestForType = document.getElementById('f_requestForType').value;

  const payload = {
    entryDate: document.getElementById('f_entryDate').value,
    mailReceivedDate: document.getElementById('f_mailDate').value,
    mailApproverEmpCode: document.getElementById('f_mailApproverCode').value,
    mailApproverName: document.getElementById('f_mailApproverName').value,
    mailApprovalDate: document.getElementById('f_mailApprovalDate').value,

    partyType: partyType,
    employeeCode: partyType === 'Staff' ? document.getElementById('f_empCode').value : '',
    employeeName: partyType === 'Staff' ? document.getElementById('f_empName').value : '',
    designation: partyType === 'Staff' ? document.getElementById('f_designation').value : '',
    department: partyType === 'Staff' ? document.getElementById('f_department').value : '',
    team: partyType === 'Staff' ? document.getElementById('f_team').value : '',
    location: partyType === 'Staff' ? document.getElementById('f_location').value : document.getElementById('f_directLocation').value,

    directType: partyType === 'Direct' ? document.querySelector('input[name="f_directType"]:checked').value : '',
    directName: partyType === 'Direct' ? document.getElementById('f_directName').value : '',
    directDetails: partyType === 'Direct' ? document.getElementById('f_directDetails').value : '',

    subject: document.getElementById('f_subject').value,
    claimType: document.getElementById('f_claimType').value,

    requestForType: requestForType,
    requestForEmpCode: requestForType === 'Staff' ? document.getElementById('f_reqForCode').value : '',
    requestForName: requestForType === 'Staff' ? document.getElementById('f_reqForName').value : '',
    requestForDesignation: requestForType === 'Staff' ? document.getElementById('f_reqForDesignation').value : '',
    requestForDepartment: requestForType === 'Staff' ? document.getElementById('f_reqForDepartment').value : '',
    requestForTeam: requestForType === 'Staff' ? document.getElementById('f_reqForTeam').value : '',
    requestForDetails: requestForType !== 'Staff' ? document.getElementById('f_reqForDetails').value : '',

    claimAmount: parseFloat(document.getElementById('f_claimAmount').value) || 0,
    remarks: document.getElementById('f_remarks').value,
    createdBy: STATE.user.username,
    entryPersonName: document.getElementById('f_entryPersonName').value || STATE.user.fullName
  };

  const claimantName = partyType === 'Staff' ? payload.employeeName : payload.directName;
  if (!claimantName || !payload.subject || !payload.claimAmount) {
    toast('Please fill the claimant name (Employee/Direct), Subject and Claim Amount.', 'error'); return;
  }
  if (requestForType === 'Staff' && !payload.requestForName) {
    toast('Please fetch or enter the Name for "Request For" (Emp ID lookup above).', 'error'); return;
  }
  await withButtonLoading(btnEl, async () => {
    try {
      const res = await api('createRequest', payload);
      const requestId = res.requestId;

      const allFiles = [...STATE.pendingFiles.Attachment, ...STATE.pendingFiles.SponsorSheet, ...STATE.pendingFiles.MailPDF];
      if (allFiles.length) {
        const uploadRes = await api('uploadAttachments', { requestId, uploadedBy: STATE.user.username, files: allFiles });
        if (uploadRes.failed && uploadRes.failed.length) {
          toast(uploadRes.failed.length + ' file(s) failed to upload: ' + uploadRes.failed.map(f => f.name).join(', '), 'error');
        }
      }
      if (sendToVerifier) {
        await api('sendToVerifier', { requestId, userBy: STATE.user.username });
        toast('Request ' + requestId + ' submitted to Verifier.');
      } else {
        toast('Request ' + requestId + ' saved as draft.');
      }
      navigate('myRequests');
    } catch (e) {
      toast(e.message, 'error');
    }
  });
}

async function exportListExcel(btnEl) {
  const rows = STATE._listRows || [];
  if (!rows.length) { toast('Nothing to export.', 'error'); return; }
  withButtonLoading(btnEl, async () => {
    try { await ensureExcelLib(); } catch (e) { toast(e.message, 'error'); return; }
    const data = rows.map(r => ({
      'Request ID': r.RequestID, 'Entry Date': fmtDate(r.EntryDate), 'Entry Person': r.EntryPersonName || r.CreatedBy,
      'Party Type': r.PartyType || 'Staff',
      'Employee': r.PartyType === 'Direct' ? (r.DirectName || '') : r.EmployeeName,
      'Code': r.PartyType === 'Direct' ? (r.DirectType || '') : r.EmployeeCode,
      'Team': r.Team || '',
      'Mail Approver': r.MailApproverName || '', 'Mail Approval Date': r.MailApprovalDate ? fmtDate(r.MailApprovalDate) : '',
      'Request For': r.RequestForType || '', 'Request For Name': r.RequestForType === 'Staff' ? (r.RequestForName || '') : (r.RequestForDetails || ''),
      'Subject': r.Subject, 'Claim Type': r.ClaimType, 'Amount': r.ClaimAmount, 'Status': r.Status
    }));
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Requests');
    XLSX.writeFile(wb, 'Reimbursement_Requests.xlsx');
  });
}

// Builds the "Request For" display value. For Staff requests it shows
// Name - Emp ID - Designation (falling back gracefully if any piece is
// missing); for Doctor/Cab/Other it keeps the type + free-text details.
function formatRequestFor(req) {
  if (!req.RequestForType) return req.RequestFor || '—';
  if (req.RequestForType === 'Staff') {
    const parts = [req.RequestForName || '—'];
    if (req.RequestForEmpCode) parts.push(req.RequestForEmpCode);
    if (req.RequestForDesignation) parts.push(req.RequestForDesignation);
    return parts.join(' - ');
  }
  return req.RequestForType + (req.RequestForDetails ? ' — ' + req.RequestForDetails : '');
}
function tabBtn(id, label, active) {
  return `<div class="tab-btn ${active ? 'active' : ''}" data-tab="${id}">${label}</div>`;
}

        ${q.ResponseText ? `<div class="bg-gray-50 rounded-lg p-3 mt-2"><p class="text-xs font-bold text-gray-500 mb-1">Response by ${q.RespondedBy} · ${fmtDateTime(q.RespondedAt)}</p><p class="text-sm">${q.ResponseText}</p></div>` : ''}
        ${(q.Status === 'Open' && STATE.user.role === 'Entry') ? `
          <div class="mt-3 flex gap-2">
            <input class="field" id="queryResp_${q.QueryID}" placeholder="Type your response...">
            <button class="btn btn-primary shrink-0" onclick="submitQueryResponse(this,'${q.QueryID}')">Respond</button>
          </div>` : ''}
      </div>`).join('') : '<p class="text-gray-400 text-sm">No queries raised.</p>';
  }
  else if (tab === 'activity') {
    el.innerHTML = `<div class="relative pl-5">
      ${d.activity.map((a,i) => `
        <div class="relative pb-5 ${i!==d.activity.length-1?'border-l-2 border-brand-100 ml-[3px]':''} pl-5">

        </div>`).join('')}
    </div>`;
  }
  else if (tab === 'actions') {

  }
}

// Returns the entry in arr with the latest value of dateField — used to
// carry the Commercial Audit amount into the Approver's default, and the
// Approver's amount into Payments' default, instead of always falling back
// to the original claim amount.
function latestOf(arr, dateField) {
  if (!arr || !arr.length) return null;
  return arr.reduce((latest, r) => (!latest || new Date(r[dateField]) >= new Date(latest[dateField])) ? r : latest, null);
}

function renderActionsPanel(req, d) {
  d = d || {};
  const latestVerification = latestOf(d.verifications, 'VerificationDate');
  const latestAudit = latestOf(d.audit, 'AuditDate');
  const latestApproval = latestOf(d.approvals, 'ApprovalDate');
  const role = STATE.user.role;
  if (role === 'Entry') {
    if (req.Status === 'Draft' || req.Status === 'Returned') {
      return `<p class="text-sm text-gray-500 mb-4">This request can be routed to the Verifier for review.</p>
        <button class="btn btn-primary" onclick="doSendToVerifier(this,'${req.RequestID}')">Send to Verifier</button>`;
    }
    return `<p class="text-sm text-gray-400">No entry actions available at the current status (${req.Status}). Check the Queries tab if a response is required.</p>`;
  }
  if (role === 'Verifier') {
    if (['Pending Verification','Under Verification','Waiting for Accounts Reply'].indexOf(req.Status) > -1) {
      return `
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div class="col-span-2"><label class="label">Verified By (Name)</label><input type="text" id="v_userName" class="field" value="${STATE.user.fullName}" placeholder="Enter the name of the person verifying this claim"></div>
        <div><label class="label">Verified Amount (₹)</label><input type="number" step="0.01" id="v_amount" class="field" value="${req.ClaimAmount}"></div>
        <div><label class="label">Verification Date</label><input type="date" id="v_date" class="field" value="${new Date().toISOString().slice(0,10)}"></div>
        <div class="col-span-2"><label class="label">Verification Remarks / Query Text</label><textarea id="v_remarks" class="field" rows="3"></textarea></div>
      </div>
      <div class="flex flex-wrap gap-3 mt-5">
        <button class="btn btn-green flex-1 sm:flex-none" onclick="doVerify(this,'${req.RequestID}','Approve')">Approve & Send to Audit</button>
        <button class="btn btn-amber flex-1 sm:flex-none" onclick="doVerify(this,'${req.RequestID}','Query')">Raise Query</button>
        <button class="btn btn-red flex-1 sm:flex-none" onclick="doVerify(this,'${req.RequestID}','Return')">Return</button>
      </div>`;
    }
    return `<p class="text-sm text-gray-400">No verification actions available at the current status (${req.Status}).</p>`;
  }
  if (role === 'Audit') {
    if (['Pending Commercial Audit','Under Audit','Waiting for Accounts Reply'].indexOf(req.Status) > -1) {
      const verificationNote = latestVerification
        ? `<p class="text-xs text-gray-500 -mt-3 mb-1">Pre-filled from Verifier: ${fmtMoney(latestVerification.VerifiedAmount)} by ${latestVerification.VerifiedUserName || latestVerification.VerifiedUser}. Adjust if needed.</p>`
        : '';
      return `
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div class="col-span-2"><label class="label">Audited By (Name)</label><input type="text" id="a_userName" class="field" value="${STATE.user.fullName}" placeholder="Enter the name of the person auditing this claim"></div>
        <div class="col-span-2">${verificationNote}<label class="label">Audited Amount (₹)</label><input type="number" step="0.01" id="a_amount" class="field" value="${latestVerification ? latestVerification.VerifiedAmount : req.ClaimAmount}"></div>
        <div><label class="label">Audit Date</label><input type="date" id="a_date" class="field" value="${new Date().toISOString().slice(0,10)}"></div>
        <div class="col-span-2"><label class="label">Audit Remarks / Query Text</label><textarea id="a_remarks" class="field" rows="3"></textarea></div>
      </div>
      <div class="flex flex-wrap gap-3 mt-5">
        <button class="btn btn-green flex-1 sm:flex-none" onclick="doAudit(this,'${req.RequestID}','Approve')">Approve</button>
        <button class="btn btn-amber flex-1 sm:flex-none" onclick="doAudit(this,'${req.RequestID}','Query')">Raise Query</button>
        <button class="btn btn-red flex-1 sm:flex-none" onclick="doAudit(this,'${req.RequestID}','Return')">Return</button>
      </div>`;
    }
    if (req.Status === 'Audit Completed') {
      return `<p class="text-sm text-gray-500 mb-4">Audit is complete. Route this approved claim to the Payments team.</p>
        <button class="btn btn-primary" onclick="doSendToPayment(this,'${req.RequestID}')">Send to Payment</button>`;
    }
    if (req.Status === 'Pending Approval') {
      return `<p class="text-sm text-gray-400">This request has been approved and sent to the Approver. Awaiting their sign-off.</p>`;
    }
    return `<p class="text-sm text-gray-400">No audit actions available at the current status (${req.Status}).</p>`;
  }
  if (role === 'Approver') {
    if (req.Status === 'Pending Approval') {
      const defaultApproved = latestAudit ? latestAudit.AuditedAmount : req.ClaimAmount;
      const auditNote = latestAudit
        ? `<p class="text-xs text-gray-500 -mt-3 mb-1">Pre-filled from Commercial Audit: ${fmtMoney(latestAudit.AuditedAmount)} by ${latestAudit.AuditedUserName || latestAudit.AuditedUser}. Adjust if needed.</p>`
        : '';
      return `
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div class="col-span-2"><label class="label">Approved By (Name)</label><input type="text" id="ap_userName" class="field" value="${STATE.user.fullName}" placeholder="Enter the name of the approver"></div>
        <div class="col-span-2">${auditNote}<label class="label">Approved Amount (₹)</label><input type="number" step="0.01" id="ap_amount" class="field" value="${defaultApproved}"></div>
        <div><label class="label">Approval Date</label><input type="date" id="ap_date" class="field" value="${new Date().toISOString().slice(0,10)}"></div>
        <div class="col-span-2"><label class="label">Approval Remarks / Query Text</label><textarea id="ap_remarks" class="field" rows="3"></textarea></div>
      </div>
      <div class="flex flex-wrap gap-3 mt-5">
        <button class="btn btn-green flex-1 sm:flex-none" onclick="doApprover(this,'${req.RequestID}','Approve')">Approve & Send to Payment</button>
        <button class="btn btn-amber flex-1 sm:flex-none" onclick="doApprover(this,'${req.RequestID}','Query')">Raise Query</button>
        <button class="btn btn-red flex-1 sm:flex-none" onclick="doApprover(this,'${req.RequestID}','Return')">Return</button>
      </div>`;
    }
    if (req.Status === 'Audited & Approved') {
      return `<p class="text-sm text-gray-500">This is a Corporate Card / ICICI claim. It has been audited and approved, and its workflow is now complete — it is not routed to Payments.</p>`;
    }
    return `<p class="text-sm text-gray-400">No approver actions available at the current status (${req.Status}).</p>`;
  }
  if (role === 'Viewer') {
    return `<p class="text-sm text-gray-400">You have view-only access to this request. Actions are not available for your account.</p>`;
  }
  if (role === 'Payments') {
    if (['Audit Completed','Pending Payment'].indexOf(req.Status) > -1) {
      const defaultPaid = latestApproval ? latestApproval.ApprovedAmount : (latestAudit ? latestAudit.AuditedAmount : req.ClaimAmount);
      const approvalNote = latestApproval
        ? `<p class="text-xs text-gray-500 -mt-3 mb-1">Pre-filled from Approver: ${fmtMoney(latestApproval.ApprovedAmount)} by ${latestApproval.ApprovedUserName || latestApproval.ApprovedUser}. Adjust if needed.</p>`
        : (latestAudit ? `<p class="text-xs text-gray-500 -mt-3 mb-1">Pre-filled from Commercial Audit: ${fmtMoney(latestAudit.AuditedAmount)}. Adjust if needed.</p>` : '');
      return `
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div><label class="label">Payment Date</label><input type="date" id="p_date" class="field" value="${new Date().toISOString().slice(0,10)}"></div>
        <div><label class="label">Payment Mode</label><select id="p_mode" class="field"><option>NEFT</option><option>RTGS</option><option>UPI</option><option>Cheque</option><option>Cash</option></select></div>
        <div><label class="label">UTR / Transaction No</label><input id="p_utr" class="field"></div>
        <div class="col-span-2">${approvalNote}<label class="label">Paid Amount (₹)</label><input type="number" step="0.01" id="p_amount" class="field" value="${defaultPaid}"></div>
        <div class="col-span-2"><label class="label">Payment Remarks</label><textarea id="p_remarks" class="field" rows="2"></textarea></div>
      </div>
      <div class="flex flex-wrap gap-3 mt-5">
        <button class="btn btn-primary w-full sm:w-auto" onclick="doProcessPayment(this,'${req.RequestID}')">Complete Payment</button>
      </div>`;
    }
    if (req.Status === 'Payment Released') {
      return `<p class="text-sm text-gray-500 mb-4">Payment has been released. Send the final acknowledgement to Commercial &amp; Accounts Entry.</p>
        <button class="btn btn-primary" onclick="doCompletePayment(this,'${req.RequestID}')">Send Acknowledgement & Close</button>`;
    }
    return `<p class="text-sm text-gray-400">No payment actions available at the current status (${req.Status}).</p>`;
  }
  return '';
}

// Renders the small detail sub-table used when a group/month summary row is
// expanded, showing every underlying request that rolled into that total.
// Field names here match what getReports() actually returns from the
// backend (buildReportRow_): EntryPersonName, MailApproverName, ClaimantName,
// RequestForName, etc.
function detailSubTable(items) {
  if (!items || !items.length) return '<p class="text-xs text-gray-400 py-2">No line items.</p>';
  return `<table class="data-table text-xs"><thead><tr>
      <th>Request ID</th><th>Entry Date</th><th>Entry Person</th><th>Mail Approver</th><th>Claimant</th><th>Team</th><th>Request For</th><th>Subject</th><th>Claim Type</th><th>Amount</th><th>Status</th>
    </tr></thead><tbody>
    ${items.map(it => `<tr class="cursor-pointer" onclick="event.stopPropagation();navigate('requestDetail',{requestId:'${it.RequestID}'})">
      <td class="font-bold text-brand-700">${it.RequestID}</td><td>${fmtDate(it.EntryDate)}</td><td>${it.EntryPersonName||it.CreatedBy||'—'}</td>
      <td>${it.MailApproverName ? it.MailApproverName + (it.MailApprovalDate ? ' · ' + fmtDate(it.MailApprovalDate) : '') : '—'}</td>
      <td>${it.ClaimantName||'—'}</td><td>${it.Team||'—'}</td><td>${it.RequestForName||'—'}</td>
      <td class="max-w-[160px] truncate">${it.Subject||''}</td><td>${it.ClaimType||''}</td><td class="font-bold">${fmtMoney(it.ClaimAmount)}</td><td>${statusPill(it.Status)}</td>
    </tr>`).join('')}
    </tbody></table>`;
}

// The backend now returns a flat list of fully-detailed rows for every
// report type (see getReports() / buildReportRow_ in Code.gs). The
// grouped report types (employee-wise, party-wise, team-wise,
// claim-type-wise, monthly-summary) still need a name/count/total/items
// view for display, so we group the flat rows client-side here rather
// than relying on the backend to pre-aggregate them.
function groupReportRows(type, rows) {
  const keyFn = {
    'employee-wise': r => r.ClaimantName || '(No name)',
    'party-wise': r => r.Department || '(No department)',
    'team-wise': r => r.Team || '(No team)',
    'claim-type-wise': r => r.ClaimType || '(No claim type)',
    'monthly-summary': r => r.Month || '(No month)'
  }[type];
  if (!keyFn) return rows;

  const groups = {};
  const order = [];
  rows.forEach(r => {
    const key = keyFn(r);
    if (!groups[key]) { groups[key] = { name: key, month: key, count: 0, total: 0, items: [] }; order.push(key); }
    groups[key].count += 1;
    groups[key].total += Number(r.ClaimAmount) || 0;
    groups[key].items.push(r);
  });
  return order.map(k => groups[k]);
}

async function loadReport(type) {
  document.querySelectorAll('[data-report]').forEach(b => b.classList.toggle('active', b.dataset.report === type));
  document.getElementById('reportTitle').textContent = REPORT_TYPES.find(r => r.id===type).label;
  const el = document.getElementById('reportContent');
  el.innerHTML = '<p class="text-gray-400 text-sm">Loading...</p>';
  let data = [];
  try {
    const df = STATE.dateFilters.reports;
    const reportPayload = Object.assign(
      STATE.user.role === 'Viewer' ? { type, teamAccess: STATE.user.teamAccess } : { type },
      { fromDate: df.from, toDate: df.to }
    );
    data = (await api('getReports', reportPayload)).data;
  } catch (e) { toast(e.message, 'error'); }
  // STATE._reportData keeps the raw flat detail rows (as returned by the
  // backend) — this is what exportReportExcel uses for a full detailed
  // export regardless of report type.
  STATE._reportData = data; STATE._reportType = type;

  if (!data.length) { el.innerHTML = '<p class="text-gray-400 text-sm py-6 text-center">No data available.</p>'; return; }

  const GROUPED_TYPES = ['employee-wise','party-wise','team-wise','claim-type-wise','monthly-summary'];

  if (GROUPED_TYPES.indexOf(type) > -1) {
    const grouped = groupReportRows(type, data);
    const labelKey = type === 'monthly-summary' ? 'month' : 'name';
    const labelHeader = type === 'monthly-summary' ? 'Month' : 'Name';
    el.innerHTML = `<table class="data-table"><thead><tr><th></th><th>${labelHeader}</th><th>Request Count</th><th>Total Amount</th></tr></thead><tbody>
      ${grouped.map((r,i) => `
        <tr class="cursor-pointer" onclick="toggleReportGroup(${i})">
          <td class="w-5 text-gray-300" id="rg_caret_${i}">▸</td><td class="font-bold">${r[labelKey]}</td><td>${r.count}</td><td class="font-bold">${fmtMoney(r.total)}</td>
        </tr>
        <tr id="rg_row_${i}" class="hidden"><td colspan="4" class="bg-gray-50/70">${detailSubTable(r.items)}</td></tr>`).join('')}
    </tbody></table>`;
  } else if (['pending-verification','pending-audit','pending-payment','completed'].indexOf(type) > -1) {
    el.innerHTML = `<table class="data-table"><thead><tr><th>Request ID</th><th>Entry Date</th><th>Entry Person</th><th>Claimant</th><th>Team</th><th>Claim Type</th><th>Amount</th><th>Status</th></tr></thead><tbody>
      ${data.map(r => `<tr class="cursor-pointer" onclick="navigate('requestDetail',{requestId:'${r.RequestID}'})"><td class="font-bold text-brand-700">${r.RequestID}</td><td>${fmtDate(r.EntryDate)}</td><td>${r.EntryPersonName||r.CreatedBy||'—'}</td><td>${r.ClaimantName||'—'}</td><td>${r.Team||'—'}</td><td>${r.ClaimType}</td><td>${fmtMoney(r.ClaimAmount)}</td><td>${statusPill(r.Status)}</td></tr>`).join('')}
    </tbody></table>`;
  } else if (type === 'verification-register') {
    el.innerHTML = `<table class="data-table"><thead><tr><th>Request ID</th><th>Date</th><th>Claimant</th><th>Team</th><th>Verified By</th><th>Amount</th><th>Action</th></tr></thead><tbody>
      ${data.map(r => `<tr class="cursor-pointer" onclick="navigate('requestDetail',{requestId:'${r.RequestID}'})"><td class="font-bold text-brand-700">${r.RequestID}</td><td>${fmtDate(r.VerificationDate)}</td><td>${r.ClaimantName||'—'}</td><td>${r.Team||'—'}</td><td>${r.VerifiedBy||'—'}</td><td>${fmtMoney(r.VerifiedAmount)}</td><td>${statusPill(r.VerificationAction)}</td></tr>`).join('')}
    </tbody></table>`;
  } else if (type === 'audit-register') {
    el.innerHTML = `<table class="data-table"><thead><tr><th>Request ID</th><th>Date</th><th>Claimant</th><th>Team</th><th>Audited By</th><th>Amount</th><th>Action</th></tr></thead><tbody>
      ${data.map(r => `<tr class="cursor-pointer" onclick="navigate('requestDetail',{requestId:'${r.RequestID}'})"><td class="font-bold text-brand-700">${r.RequestID}</td><td>${fmtDate(r.AuditDate)}</td><td>${r.ClaimantName||'—'}</td><td>${r.Team||'—'}</td><td>${r.AuditedBy||'—'}</td><td>${fmtMoney(r.AuditedAmount)}</td><td>${statusPill(r.AuditAction)}</td></tr>`).join('')}
    </tbody></table>`;
  } else if (type === 'payment-register') {
    el.innerHTML = `<table class="data-table"><thead><tr><th>Request ID</th><th>Date</th><th>Claimant</th><th>Team</th><th>Mode</th><th>UTR</th><th>Paid Amount</th></tr></thead><tbody>
      ${data.map(r => `<tr class="cursor-pointer" onclick="navigate('requestDetail',{requestId:'${r.RequestID}'})"><td class="font-bold text-brand-700">${r.RequestID}</td><td>${fmtDate(r.PaymentDate)}</td><td>${r.ClaimantName||'—'}</td><td>${r.Team||'—'}</td><td>${r.PaymentMode||'—'}</td><td>${r.UTRNo||'—'}</td><td class="font-bold">${fmtMoney(r.PaidAmount)}</td></tr>`).join('')}
    </tbody></table>`;
  } else if (type === 'corporate-card-register') {
    STATE._corpCardRegisterData = data;
    el.innerHTML = corporateCardRegisterHtml(data);
  }
}

// CORPORATE CARD: Corporate Card / ICICI claims (Subject contains
// "Corporate Card"/"Corporate"/"ICICI") never reach Payments — this
// register is their dedicated, searchable/filterable audit trail. Columns
// follow the spec: Request ID, Entry Date, Employee Name, Employee Code,
// Department, Team, Subject, Claim Type, Claim Amount, Verified Amount,
// Audited Amount, Approved Amount, Approved By, Current Status.
function corporateCardRegisterHtml(data) {
  const statuses = Array.from(new Set(data.map(r => r.Status))).sort();
  return `
    <div class="flex flex-col sm:flex-row gap-2 mb-4">
      <div class="relative flex-1">
        <input id="corpCardSearch" class="field !py-2 pl-9" placeholder="Search Request ID, employee, department, team, subject..." oninput="filterCorporateCardRegister()">
        <svg class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z"/></svg>
      </div>
      <select id="corpCardStatusFilter" class="field sm:!w-56" onchange="filterCorporateCardRegister()">
        <option value="">All Statuses</option>
        ${statuses.map(s => `<option value="${s}">${s}</option>`).join('')}
      </select>
    </div>
    <div id="corpCardRegisterTableWrap">${corporateCardRegisterRows(data)}</div>`;
}

function corporateCardRegisterRows(data) {
  if (!data.length) return '<p class="text-gray-400 text-sm py-6 text-center">No matching Corporate Card requests.</p>';
  return `<table class="data-table"><thead><tr>
      <th>Request ID</th><th>Entry Date</th><th>Employee Name</th><th>Employee Code</th><th>Department</th><th>Team</th><th>Subject</th><th>Claim Type</th><th>Claim Amount</th><th>Verified Amount</th><th>Audited Amount</th><th>Approved Amount</th><th>Approved By</th><th>Status</th>
    </tr></thead><tbody>
    ${data.map(r => `<tr class="cursor-pointer" onclick="navigate('requestDetail',{requestId:'${r.RequestID}'})">
      <td class="font-bold text-brand-700">${r.RequestID}</td><td>${fmtDate(r.EntryDate)}</td><td>${r.ClaimantName||'—'}</td><td>${r.ClaimantCode||'—'}</td>
      <td>${r.Department||'—'}</td><td>${r.Team||'—'}</td><td class="max-w-[200px] truncate">${r.Subject||''}</td><td>${r.ClaimType||''}</td>
      <td class="font-bold">${fmtMoney(r.ClaimAmount)}</td><td>${r.VerifiedAmount!==''&&r.VerifiedAmount!==undefined?fmtMoney(r.VerifiedAmount):'—'}</td>
      <td>${r.AuditedAmount!==''&&r.AuditedAmount!==undefined?fmtMoney(r.AuditedAmount):'—'}</td><td>${r.ApprovedAmount!==''&&r.ApprovedAmount!==undefined?fmtMoney(r.ApprovedAmount):'—'}</td>
      <td>${r.ApprovedBy||'—'}</td><td>${statusPill(r.Status)}</td>
    </tr>`).join('')}
    </tbody></table>`;
}

function filterCorporateCardRegister() {
  const q = (document.getElementById('corpCardSearch')?.value || '').toLowerCase().trim();
  const status = document.getElementById('corpCardStatusFilter')?.value || '';
  const all = STATE._corpCardRegisterData || [];
  const filtered = all.filter(r => {
    if (status && r.Status !== status) return false;
    if (!q) return true;
    return (r.RequestID + (r.ClaimantName||'') + (r.ClaimantCode||'') + (r.Department||'') + (r.Team||'') + (r.Subject||'') + (r.ClaimType||''))
      .toLowerCase().indexOf(q) > -1;
  });
  document.getElementById('corpCardRegisterTableWrap').innerHTML = corporateCardRegisterRows(filtered);
}

function toggleReportGroup(i) {
  const row = document.getElementById('rg_row_' + i);
  const caret = document.getElementById('rg_caret_' + i);
  if (!row) return;
  const hidden = row.classList.toggle('hidden');
  caret.textContent = hidden ? '▸' : '▾';
}

// Report rows come back from the backend with raw date values (Apps Script
// serializes sheet Date cells to full ISO strings, e.g.
// "2026-06-30T18:30:00.000Z"). The on-screen tables already run these
// through fmtDate(), but the Excel export was writing them straight through
// unformatted. This picks out every known date-ish field on a report row
// and rewrites it as a plain dd-mmm-yyyy string before export.
const REPORT_DATE_FIELDS = ['EntryDate','MailReceivedDate','MailApprovalDate','VerificationDate','AuditDate','ApprovalDate','PaymentDate'];
function exportDateStr_(v) {
  if (!v) return '';
  const dt = new Date(v);
  if (isNaN(dt)) return v;
  return dt.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
}
function formatRowDatesForExport(row) {
  const out = Object.assign({}, row);
  REPORT_DATE_FIELDS.forEach(f => { if (f in out) out[f] = exportDateStr_(out[f]); });
  return out;
}

// Builds a workbook that's a genuine detailed register: for group/month
// reports it writes a "Summary" sheet (name/count/total) plus a "Detail"
// sheet with every underlying request line item; for row-level report
// types (pending lists, audit/payment registers) it exports the full set
// of columns already returned by the backend, not a trimmed-down view.
function exportReportExcel(btnEl) {
  const data = STATE._reportData || [];
  if (!data.length) { toast('Nothing to export.', 'error'); return; }
  withButtonLoading(btnEl, async () => {
    try { await ensureExcelLib(); } catch (e) { toast(e.message, 'error'); return; }
    const wb = XLSX.utils.book_new();
    const hasItems = data.some(r => Array.isArray(r.items));
    if (hasItems) {
      const summaryRows = data.map(r => ({ Name: r.name || r.month, 'Request Count': r.count, 'Total Amount': r.total }));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summaryRows), 'Summary');
      const detailRows = [];
      data.forEach(group => (group.items || []).forEach(item => detailRows.push(Object.assign({ Group: group.name || group.month }, formatRowDatesForExport(item)))));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(detailRows), 'Detail');
    } else {
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data.map(formatRowDatesForExport)), STATE._reportType.slice(0,31));
    }
    XLSX.writeFile(wb, 'Report_' + STATE._reportType + '.xlsx');
    toast('Detailed report downloaded.');
  });
}

function closeModal() { document.getElementById('modalHost').innerHTML = ''; }

// Swaps the layout-* class on #printArea so both the on-screen preview and
// whatever gets captured for print/PDF reflect the chosen density.
function applyPrintLayout(layout) {
  const el = document.getElementById('printArea');
  if (!el) return;
  el.classList.remove('layout-standard', 'layout-compact', 'layout-fitpage');
  el.classList.add('layout-' + (layout || 'standard'));
}
function getSelectedLayout() {
  const sel = document.getElementById('summaryLayoutSelect');
  return sel ? sel.value : 'standard';
}
function getSelectedPaper() {
  const sel = document.getElementById('summaryPaperSelect');
  return sel ? sel.value : 'a4';
}
function getSelectedOrientation() {
  const sel = document.getElementById('summaryOrientationSelect');
  return sel && sel.value === 'landscape' ? 'landscape' : 'portrait';
}
function printSummary() {
  applyPrintLayout(getSelectedLayout());
  const paper = getSelectedPaper() === 'letter' ? 'letter' : 'A4';
  const orientation = getSelectedOrientation();
  // Inject a temporary @page rule so the browser's print engine honors the
  // chosen paper size and orientation (there's no way to set these via a
  // regular class).
  let styleEl = document.getElementById('printPageSizeStyle');
  if (!styleEl) {
    styleEl = document.createElement('style');
    styleEl.id = 'printPageSizeStyle';
    document.head.appendChild(styleEl);
  }
  styleEl.textContent = `@media print{ @page{ size: ${paper} ${orientation}; margin: 10mm; } #printArea{ max-width: none; } }`;
  window.print();
}

async function downloadSummaryPDF(requestId, btnEl) {
  withButtonLoading(btnEl, async () => {
    try { await ensurePdfLibs(); } catch (e) { toast(e.message, 'error'); return; }
    const layout = getSelectedLayout();
    const paper = getSelectedPaper() === 'letter' ? 'letter' : 'a4';
    const orientation = getSelectedOrientation();
    applyPrintLayout(layout);
    const el = document.getElementById('printArea');
    const box = document.getElementById('summaryModalBox');
    // The modal wrapper is a scrollable, height-clipped box (max-h-90vh),
    // and normally capped to max-w-3xl. Without lifting both, html2canvas
    // only captures whatever was visible on screen (content below the
    // scroll fold gets left out), and Landscape mode would just get padded
    // with blank space on the sides instead of actually using the extra
    // page width. Temporarily lift the clip/width, capture, then restore.
    const prevStyle = box ? { maxHeight: box.style.maxHeight, overflow: box.style.overflow, maxWidth: box.style.maxWidth } : null;
    if (box) {
      box.style.maxHeight = 'none';
      box.style.overflow = 'visible';
      if (orientation === 'landscape') box.style.maxWidth = '1400px';
    }
    let canvas;
    try {
      canvas = await html2canvas(el, { scale: 2, useCORS: true, allowTaint: false, backgroundColor: '#ffffff' });
    } finally {
      if (box && prevStyle) { box.style.maxHeight = prevStyle.maxHeight; box.style.overflow = prevStyle.overflow; box.style.maxWidth = prevStyle.maxWidth; }
    }
    // JPEG at 0.85 quality instead of lossless PNG is the main fix for the
    // huge file size — a tall, high-res PNG screenshot easily runs 10MB+,
    // while the JPEG equivalent is typically well under 1MB with no
    // visible quality loss for a text/table document like this.
    const imgData = canvas.toDataURL('image/jpeg', 0.85);
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: orientation === 'landscape' ? 'l' : 'p', unit: 'pt', format: paper, compress: true });
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    const imgHeight = (canvas.height * pageWidth) / canvas.width;

    if (layout === 'fitpage') {
      // Scale the whole capture down to fit within exactly one page, no
      // matter how long the actual content is. Combined with the compact
      // font/spacing already applied above, this keeps text readable for
      // shorter requests and still guarantees a single page for long ones.
      const scale = Math.min(1, pageHeight / imgHeight);
      const finalWidth = pageWidth * scale;
      const finalHeight = imgHeight * scale;
      const xOffset = (pageWidth - finalWidth) / 2;
      pdf.addImage(imgData, 'JPEG', xOffset, 0, finalWidth, finalHeight);
    } else {
      // Slice the capture across as many pages as needed instead of
      // squashing it onto one page (which used to cut off anything past
      // the first page height).
      let heightLeft = imgHeight;
      let position = 0;
      pdf.addImage(imgData, 'JPEG', 0, position, pageWidth, imgHeight);
      heightLeft -= pageHeight;
      while (heightLeft > 0) {
        position -= pageHeight;
        pdf.addPage();
        pdf.addImage(imgData, 'JPEG', 0, position, pageWidth, imgHeight);
        heightLeft -= pageHeight;
      }
    }
    pdf.save('Reimbursement_' + requestId + '.pdf');
  });
}
